<!-- Navbar famille -->
<nav class="fam-nav">
  <a routerLink="/" class="fam-nav__logo">
    <img src="assets/UI/memo-brand.png" alt="Logo MemoClair" class="fam-nav__logo-img" />
  </a>

  <button type="button" class="fam-nav__back" (click)="goBack()">← Retour</button>

  <select class="fam-nav__select"
          [ngModel]="selectedPatientId"
          (ngModelChange)="onPatientChange($event)"
          aria-label="Choisir le patient">
    <option *ngFor="let p of patients" [value]="p.id">{{ p.displayName }}</option>
  </select>

</nav>

<main class="dashboard">

  <!-- Prénom — point d'attention immédiat -->
  <h1 class="dashboard-name">{{ currentPatient.firstName }}</h1>

  <!-- KPI row -->
  <div class="kpi-row">

    <div class="kpi-card">
      <span class="kpi-icon" aria-hidden="true">⏱</span>
      <span class="kpi-value">{{ currentProfile.attentionSpanMinutes }}</span>
      <span class="kpi-unit">min</span>
      <span class="kpi-label">Attention</span>
    </div>

    <div class="kpi-card">
      <span class="kpi-icon" aria-hidden="true">🎯</span>
      <span class="kpi-value kpi-value--stage">{{ currentPatient.stageLabel }}</span>
      <span class="kpi-label">Stade</span>
    </div>

    <div class="kpi-card">
      <span class="kpi-icon" aria-hidden="true">🏷</span>
      <span class="kpi-value">{{ currentProfile.themes.length }}</span>
      <span class="kpi-unit">thème{{ currentProfile.themes.length > 1 ? 's' : '' }}</span>
      <span class="kpi-label">Centres d'intérêt</span>
    </div>

  </div>

  <!-- Thèmes sous forme de pills uniquement -->
  <div class="theme-row" role="list" aria-label="Thèmes porteurs">
    <span *ngFor="let t of currentProfile.themes"
          class="theme-pill"
          role="listitem">
      {{ getThemeLabel(t) }}
    </span>
  </div>

  <!-- Deux actions massives -->
  <div class="action-row">

    <a routerLink="/caregiver/media" class="action-btn action-btn--amber">
      <span class="action-btn__icon" aria-hidden="true">📸</span>
      <span class="action-btn__label">Ajouter des souvenirs</span>
    </a>

    <a routerLink="/games" class="action-btn action-btn--green">
      <span class="action-btn__icon" aria-hidden="true">🎮</span>
      <span class="action-btn__label">Jouer</span>
    </a>

  </div>

</main>
