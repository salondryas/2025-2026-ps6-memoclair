<section class="end-layout" aria-live="polite">
  <img src="assets/UI/Mascotte-bravo.png" class="bg-mascot" />
  <div class="end-card">
    <h1>🏆 Félicitations !</h1>
    <p>Merci pour votre participation avec MemoClair 🌿</p>
    <p *ngIf="latestSession">
      Dernière séance : {{ gameLabel }} · {{ latestSession.durationMinutes }} min<br />
      {{ latestSession.summary }}
    </p>
    <a routerLink="/games" class="cta-btn">Revenir au catalogue</a>
  </div>
</section>
