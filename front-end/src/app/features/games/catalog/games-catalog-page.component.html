<main class="catalog">
  <header class="catalog-header">
    <a routerLink="/games/patient-selection" class="btn-back" aria-label="Retour à la sélection d'accueilli">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Retour
    </a>

    <h1 class="catalog-patient">{{ patientFirstName() }}</h1>

    <img
      class="patient-photo-circle"
      [src]="patientAvatarUrl()"
      [alt]="'Photo de ' + patientFirstName()">
  </header>

  <section class="catalog-grid" aria-label="Jeux disponibles">
    @for (game of games; track game.id) {
      <article class="game-card">
        <img class="game-card__image" [src]="getThumbnail(game.id)" alt="">
        <h2 class="game-card__title">{{ game.title }}</h2>

        @if (showDuoToggleFor(game)) {
          <button
            type="button"
            class="btn-duo-toggle"
            [class.btn-duo-toggle--active]="isDuoEnabledFor(game)"
            [attr.aria-pressed]="isDuoEnabledFor(game)"
            [attr.aria-label]="'Activer le mode duo pour ' + game.title"
            (click)="toggleDuoFor(game)">
            {{ isDuoEnabledFor(game) ? 'Mode Duo activé' : 'Activer le mode Duo' }}
          </button>
        }

        <a [routerLink]="isDuoEnabledFor(game) ? '/games/game-duo' : game.route"
           class="btn-jouer"
           [class.btn-jouer--duo]="isDuoEnabledFor(game)"
           [attr.aria-label]="'Lancer le jeu ' + game.title + (isDuoEnabledFor(game) ? ' en mode duo' : '')">
          {{ isDuoEnabledFor(game) ? 'Jouer en Duo' : 'Jouer' }}
        </a>
      </article>
    }
  </section>
</main>
